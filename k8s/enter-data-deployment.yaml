apiVersion: apps/v1
kind: Deployment
metadata:
  name: enter-data-app
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: enter-data-app
  template:
    metadata:
      labels:
        app: enter-data-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: enter-data-app
        image: us-east1-docker.pkg.dev/cit3495-project2/cit3495-repo/enter-data-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        # Only route traffic after Flask is up and MySQL is reachable.
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 3
        # Restart the pod if the app stops responding.
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
          timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: enter-data-app
spec:
  selector:
    app: enter-data-app
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer

