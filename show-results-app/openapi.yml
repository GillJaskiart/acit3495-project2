openapi: 3.0.0
info:
  title: Show Results Service
  version: 1.0.0
paths:
  /login:
    get:
      summary: Show login page
      responses:
        "200": { description: HTML login page }
    post:
      summary: Submit credentials and receive session cookie
      responses:
        "302": { description: Redirect to /results on success }
  /results:
    get:
      summary: Show analytics results (requires auth)
      responses:
        "200": { description: HTML results page }
        "302": { description: Redirect to /login if not authenticated }
  /logout:
    get:
      summary: Clear token cookie and redirect to login
      responses:
        "302": { description: Redirect to /login }
